<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>РусЧат - Мессенджер для россиян</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="nitro-styles.css">
</head>
<body>
    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <h1>🇷🇺 РусЧат</h1>
            <p>Мессенджер для российских пользователей</p>
            <div class="auth-form">
                <input type="text" id="username" placeholder="Имя пользователя" required>
                <input type="tel" id="phone" placeholder="+7 (___) ___-__-__" pattern="\+7\d{10}" required>
                <button onclick="login()">Войти</button>
                <p class="info">Доступ только для пользователей из России</p>
            </div>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div class="sidebar">
            <div class="server-list"></div>
            <div class="channels"></div>
        </div>

        <div class="main-content">
            <div class="chat-header">
                <span class="channel-name"># общий</span>
                <div class="header-actions">
                    <button onclick="showWeather()">🌤️ Погода</button>
                    <button onclick="showStocks()">📈 Акции</button>
                    <button onclick="showGroups()">👥 Группы</button>
                    <button onclick="showNitro()" class="nitro-btn">⭐ РусНитро</button>
                    <button onclick="showSettings()">⚙️</button>
                    <button onclick="logout()">Выход</button>
                </div>
            </div>
            <div class="messages" id="messages"></div>
            <div class="message-input">
                <input type="text" id="messageText" placeholder="Написать сообщение..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>

        <div class="right-sidebar">
            <div class="members-title">УЧАСТНИКИ — <span id="memberCount">1</span></div>
            <div class="members-list" id="membersList"></div>
        </div>

        <div class="voice-settings" id="voiceSettings">
            <button class="voice-control-btn" onclick="toggleMute()">
                <span>🎤</span> Откл./Вкл. микрофон
            </button>
            <button class="voice-control-btn" onclick="shareScreen()">
                <span>🖥️</span> Демонстрация экрана
            </button>
            <button class="voice-control-btn danger" onclick="leaveVoiceChannel()">
                <span>📞</span> Отключиться
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
